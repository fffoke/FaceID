<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>КПП — FacePanel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script th:src="@{/js/sockjs.min.js}"></script>
    <script th:src="@{/js/stomp.min.js}"></script>

    <link rel="stylesheet" th:href="@{/css/common.css}">

    <style>
        body {
            background: radial-gradient(ellipse at top, #0f1624 0%, var(--bg-primary) 60%);
        }

        .kpp-wrapper {
            max-width: 1400px;
            margin: 24px auto 48px;
            padding: 0 16px;
        }

        .kpp-header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .kpp-header h1 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--text-primary);
            text-align: center;
        }

        .kpp-search {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
        }

        .kpp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 16px;
        }

        .camera-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .camera-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .camera-card-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .camera-open-link {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
            transition: opacity var(--transition);
        }

        .camera-open-link:hover { opacity: 0.7; }

        .building-tag {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--accent-light);
            background: var(--accent-subtle);
            border: 1px solid var(--accent-border);
            padding: 3px 10px;
            border-radius: var(--radius-pill);
            white-space: nowrap;
        }

        /* Живой статус камеры */
        .cam-status {
            border-radius: var(--radius-lg);
            padding: 22px 16px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .cam-status.idle {
            background: rgba(100, 116, 139, 0.08);
            border: 1px solid rgba(100, 116, 139, 0.2);
        }

        .cam-status.active {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 24px rgba(16, 185, 129, 0.15);
        }

        .cam-status-title {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            color: var(--text-secondary);
        }

        .cam-status.active .cam-status-title {
            color: #ecfdf5;
        }

        .cam-status-sub {
            margin-top: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Лента распознаваний */
        .cam-feed {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 260px;
            overflow-y: auto;
        }

        .feed-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        .feed-name {
            color: var(--text-primary);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .feed-time {
            color: var(--accent-light);
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .feed-empty {
            color: var(--text-dim);
            font-size: 0.82rem;
            text-align: center;
            padding: 8px;
        }

        .conn-badge {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-dim);
            margin-top: 16px;
        }

        .conn-badge.ok { color: var(--success); }

        @media (max-width: 768px) {
            .kpp-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="kpp-wrapper">
        <div class="kpp-header">
            <h1>КПП — распознавание в реальном времени</h1>
            <input type="text" class="kpp-search" id="kpp-search"
                placeholder="Поиск по имени во всех камерах..." oninput="applySearch()">
        </div>

        <div class="kpp-grid" id="kpp-grid">
            <div th:each="cam : ${cameras}" class="camera-card" th:attr="data-camera=${cam.name}">
                <div class="camera-card-header">
                    <a class="camera-card-title" th:href="@{/kpp/{n}(n=${cam.name})}"
                        th:text="${cam.name}" style="color: var(--text-primary);">KPP1</a>
                    <span class="building-tag" th:if="${cam.building != null and cam.building != ''}"
                        th:text="${cam.building}">Корпус</span>
                    <a class="camera-open-link" th:href="@{/kpp/{n}(n=${cam.name})}">Открыть &rarr;</a>
                </div>
                <div class="cam-status idle">
                    <div class="cam-status-title">Ожидание</div>
                    <div class="cam-status-sub">Нет лица в зоне камеры</div>
                </div>
                <div class="cam-feed">
                    <div class="feed-empty">Пока нет распознаваний</div>
                </div>
            </div>
        </div>

        <div th:if="${cameras == null or cameras.isEmpty()}" class="empty-state">
            <div class="empty-icon">&#x1F4F9;</div>
            <h3>Нет камер</h3>
            <p>Добавьте камеры на странице <a href="/cameras" style="color: var(--accent);">Камеры</a> —
                для каждой здесь появится своя панель</p>
        </div>

        <div class="conn-badge" id="conn-badge">Подключение...</div>
    </div>

    <script>
        const STATUS_TIMEOUT_MS = 2000;
        const MAX_FEED_ITEMS = 15;
        const resetTimers = {};

        function getCard(cameraName) {
            let card = document.querySelector('.camera-card[data-camera="' + CSS.escape(cameraName) + '"]');
            if (card) return card;

            // Камеры нет в реестре — создаём карточку на лету, чтобы события не терялись
            const grid = document.getElementById('kpp-grid');
            card = document.createElement('div');
            card.className = 'camera-card';
            card.setAttribute('data-camera', cameraName);
            card.innerHTML =
                '<div class="camera-card-header"><a class="camera-card-title" style="color: var(--text-primary);"></a>' +
                '<span class="building-tag">не в реестре</span>' +
                '<a class="camera-open-link">Открыть &rarr;</a></div>' +
                '<div class="cam-status idle"><div class="cam-status-title">Ожидание</div>' +
                '<div class="cam-status-sub">Нет лица в зоне камеры</div></div>' +
                '<div class="cam-feed"><div class="feed-empty">Пока нет распознаваний</div></div>';
            const titleLink = card.querySelector('.camera-card-title');
            titleLink.textContent = cameraName;
            titleLink.href = '/kpp/' + encodeURIComponent(cameraName);
            card.querySelector('.camera-open-link').href = '/kpp/' + encodeURIComponent(cameraName);
            grid.appendChild(card);
            return card;
        }

        function showRecognition(data) {
            const cameraName = data.cameraName || 'Без камеры';
            const personName = data.personName || 'Неизвестный';
            const time = new Date(data.timestamp || Date.now());
            const timeStr = time.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            const card = getCard(cameraName);

            // Живой статус
            const statusEl = card.querySelector('.cam-status');
            statusEl.className = 'cam-status active';
            statusEl.querySelector('.cam-status-title').textContent = personName;
            statusEl.querySelector('.cam-status-sub').textContent = 'Доступ разрешён · ' + timeStr;

            if (resetTimers[cameraName]) clearTimeout(resetTimers[cameraName]);
            resetTimers[cameraName] = setTimeout(function () {
                statusEl.className = 'cam-status idle';
                statusEl.querySelector('.cam-status-title').textContent = 'Ожидание';
                statusEl.querySelector('.cam-status-sub').textContent = 'Нет лица в зоне камеры';
            }, STATUS_TIMEOUT_MS);

            // Лента
            const feed = card.querySelector('.cam-feed');
            const empty = feed.querySelector('.feed-empty');
            if (empty) empty.remove();

            const item = document.createElement('div');
            item.className = 'feed-item';
            const nameEl = document.createElement('span');
            nameEl.className = 'feed-name';
            nameEl.textContent = personName;
            const timeEl = document.createElement('span');
            timeEl.className = 'feed-time';
            timeEl.textContent = timeStr;
            item.appendChild(nameEl);
            item.appendChild(timeEl);
            feed.prepend(item);

            while (feed.children.length > MAX_FEED_ITEMS) {
                feed.removeChild(feed.lastChild);
            }

            applySearch();
        }

        // Поиск по имени во всех лентах
        function applySearch() {
            const q = document.getElementById('kpp-search').value.trim().toLowerCase();
            document.querySelectorAll('.feed-item').forEach(function (item) {
                const name = item.querySelector('.feed-name').textContent.toLowerCase();
                item.style.display = (!q || name.includes(q)) ? '' : 'none';
            });
        }

        function connectWs() {
            const socket = new SockJS('/ws');
            const stompClient = Stomp.over(socket);
            stompClient.debug = null;
            const badge = document.getElementById('conn-badge');

            stompClient.connect({}, function () {
                badge.textContent = 'Подключено';
                badge.className = 'conn-badge ok';
                stompClient.subscribe('/topic/attendance', function (message) {
                    try {
                        showRecognition(JSON.parse(message.body));
                    } catch (e) { console.error('Bad message', e); }
                });
            }, function () {
                badge.textContent = 'Переподключение...';
                badge.className = 'conn-badge';
                setTimeout(connectWs, 3000);
            });
        }

        connectWs();
    </script>

</body>

</html>
