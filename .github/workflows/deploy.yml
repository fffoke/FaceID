name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: ./mvnw -B package -DskipTests

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload artifacts
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SERVER_PORT }} \
            target/operator-panel-0.0.1-SNAPSHOT.jar \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/opencv/project/operator-panel-0.0.1-SNAPSHOT.jar.new
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SERVER_PORT }} \
            OpenCVRework/face_2.py \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/opencv/project/OpenCVRework/face_2.py.new

      - name: Deploy & restart services
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash -s << 'DEPLOY'
          set -e
          cd /home/opencv/project

          # Бэкап текущего jar (храним 3 последних)
          cp operator-panel-0.0.1-SNAPSHOT.jar "operator-panel-0.0.1-SNAPSHOT.jar.bak-$(date +%Y%m%d-%H%M%S)"
          ls -t operator-panel-0.0.1-SNAPSHOT.jar.bak-* 2>/dev/null | tail -n +4 | xargs -r rm --

          mv operator-panel-0.0.1-SNAPSHOT.jar.new operator-panel-0.0.1-SNAPSHOT.jar
          mv OpenCVRework/face_2.py.new OpenCVRework/face_2.py

          sudo /usr/bin/systemctl restart operator.service
          sleep 8
          systemctl is-active operator.service

          # Камеры: рестарт не критичен для деплоя панели
          sudo /usr/bin/systemctl restart face-kpp1.service || true
          sudo /usr/bin/systemctl restart face-kpp2.service || true
          sleep 3
          echo "face-kpp1: $(systemctl is-active face-kpp1.service)"
          echo "face-kpp2: $(systemctl is-active face-kpp2.service)"
          DEPLOY

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            'curl -s -o /dev/null -w "HTTP %{http_code}" --max-time 10 http://127.0.0.1:8080/login'
